============================================================
  MR HATS - Catalogo Digital Premium
  Version 2.0
  San Antonio, TX
============================================================

INSTRUCCIONES DE HOSTING (ESPANOL):

1. COMO HOSTEAR GRATIS EN GITHUB PAGES:
   a) Crea una cuenta en https://github.com (si no tienes una)
   b) Crea un nuevo repositorio: click en "+" > "New repository"
   c) Nombra tu repositorio: "mr-hats-catalogo" (o el nombre que prefieras)
   d) Marca la opcion "Public"
   e) Click en "Create repository"
   f) Click en "uploading an existing file"
   g) Arrastra este archivo HTML y renombralo a "index.html"
   h) Click en "Commit changes"
   i) Ve a Settings > Pages
   j) En "Source" selecciona "main" y click en "Save"
   k) Tu sitio estara disponible en: https://TU-USUARIO.github.io/mr-hats-catalogo/
   l) Espera 2-3 minutos para que se publique

2. COMO HOSTEAR GRATIS EN NETLIFY (MAS FACIL):
   a) Ve a https://www.netlify.com y crea una cuenta gratis
   b) En el dashboard, busca la seccion que dice "Deploy manually"
      o "Drag and drop your site output folder here"
   c) Crea una carpeta en tu computadora llamada "mr-hats"
   d) Copia este archivo dentro de esa carpeta y renombralo a "index.html"
   e) Arrastra la carpeta completa al area de Netlify
   f) Netlify te dara un link automatico (ej: happy-cat-123.netlify.app)
   g) Puedes cambiar el nombre en "Site settings" > "Change site name"

3. COMO SUBIR IMAGENES DE PRODUCTOS:

   Opcion A - imgbb.com (RECOMENDADO):
   a) Ve a https://imgbb.com
   b) Click en "Start Uploading" (no necesitas cuenta)
   c) Selecciona la foto de tu producto
   d) Click en "Upload"
   e) Copia el "Direct link" (termina en .jpg o .png)
   f) Usa ese link como URL de imagen en el panel de admin

   Opcion B - imgur.com:
   a) Ve a https://imgur.com
   b) Click en "New Post"
   c) Arrastra o selecciona tu imagen
   d) Click derecho en la imagen > "Copy image address"
   e) Usa ese link en el panel de admin

   Opcion C - postimages.org:
   a) Ve a https://postimages.org
   b) Selecciona tu imagen y sube
   c) Copia el "Direct link"

   TIPS PARA FOTOS:
   - Toma fotos con buena luz natural
   - Fondo limpio (blanco o negro)
   - Tamano recomendado: 600x600 pixeles minimo
   - Formato: JPG o PNG

4. COMO COMPARTIR EL LINK CON CLIENTES POR WHATSAPP:
   a) Copia el link de tu sitio (de GitHub Pages o Netlify)
   b) Abre WhatsApp
   c) Envia un mensaje como:
      "Checa nuestro catalogo de gorras premium! [TU LINK AQUI]
       MR HATS - San Antonio, TX"
   d) Tambien puedes poner el link en tu estado/story de WhatsApp
   e) Agrega el link a tu perfil de Instagram/Facebook

============================================================
-->

function loadData(key, defaults) {
  try {
    const d = localStorage.getItem('mrhats_' + key);
    return d ? JSON.parse(d) : defaults;
  } catch { return defaults; }
}

function saveData(key, data) {
  localStorage.setItem('mrhats_' + key, JSON.stringify(data));
}

products.forEach((p, i) => {
  if (!p.id) p.id = Date.now().toString() + i;
  if (!p.images) p.images = p.image ? [p.image] : [];
});

const MAX_PHOTOS_PER_BRAND = 30;
let galleryIndex = 0;

function getProductImages(p) {
  return p.images && p.images.length > 0 ? p.images : (p.image ? [p.image] : []);
}

function getProductImage(p) {
  const imgs = getProductImages(p);
  return imgs.length > 0 ? imgs[0] : '';
}

function getBrandPhotoCount(brand, excludeProductId) {
  return products
    .filter(p => p.brand === brand && p.id !== excludeProductId)
    .reduce((sum, p) => sum + getProductImages(p).length, 0);
}

/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = (type === 'success' ? '&#10003; ' : '&#9888; ') + msg;
  t.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function getBrands() {
  const b = new Set();
  products.forEach(p => b.add(p.brand));
  return [...b].sort();
}

function formatPrice(n) { return '$' + Number(n).toFixed(2); }

/* ============================================================
   RENDER PRODUCTS
   ============================================================ */
function renderBrandFilters() {
  const brands = getBrands();
  const el = document.getElementById('brandFilters');
  el.innerHTML = `<button class="brand-chip ${activeBrand === 'all' ? 'active' : ''}" onclick="filterBrand('all')">All</button>` +
    brands.map(b => `<button class="brand-chip ${activeBrand === b ? 'active' : ''}" onclick="filterBrand('${b.replace(/'/g, "\\'")}')">${b}</button>`).join('');
}

function filterBrand(b) {
  activeBrand = b;
  renderBrandFilters();
  renderProducts();
}

function renderProducts() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = products.filter(p => {
    const matchBrand = activeBrand === 'all' || p.brand === activeBrand;
    const matchSearch = !query || p.name.toLowerCase().includes(query) || p.brand.toLowerCase().includes(query);
    return matchBrand && matchSearch;
  });

  const grid = document.getElementById('productsGrid');
  const count = document.getElementById('productsCount');
  count.textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><div class="icon">&#128694;</div><p>No hats found. Try a different search.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="openProduct('${p.id}')">
      <div class="img-wrap">
        <img src="${getProductImage(p)}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 400%22><rect fill=%22%231a1a1a%22 width=%22400%22 height=%22400%22/><text x=%22200%22 y=%22200%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23444%22 font-size=%2240%22>No Image</text></svg>'">
        ${getProductImages(p).length > 1 ? `<span class="gallery-counter">${getProductImages(p).length} fotos</span>` : ''}
        <button class="quick-add" onclick="event.stopPropagation();addToCart('${p.id}')" title="Add to Cart">+</button>
      </div>
      <div class="product-info">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${formatPrice(p.price)}</div>
      </div>
    </div>
  `).join('');
}

/* ============================================================
   PRODUCT MODAL
   ============================================================ */
function openProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  const imgs = getProductImages(p);
  galleryIndex = 0;

  function renderGallery(idx) {
    const container = document.getElementById('modalImg');
    const img = imgs[idx] || '';
    container.innerHTML = `
      <img src="${img}" alt="${p.name}">
      ${imgs.length > 1 ? `
        <button class="gallery-nav prev" onclick="event.stopPropagation();galleryNav('${p.id}', -1)">&#8249;</button>
        <button class="gallery-nav next" onclick="event.stopPropagation();galleryNav('${p.id}', 1)">&#8250;</button>
        <span class="gallery-counter">${idx + 1} / ${imgs.length}</span>
        <div class="gallery-dots">${imgs.map((_, i) => `<button class="gallery-dot ${i === idx ? 'active' : ''}" onclick="event.stopPropagation();galleryGo('${p.id}', ${i})"></button>`).join('')}</div>
      ` : ''}
    `;
  }

  window._currentGalleryRender = renderGallery;
  renderGallery(0);

  document.getElementById('modalBody').innerHTML = `
    <div class="brand-label">${p.brand}</div>
    <h2>${p.name}</h2>
    <div class="price">${formatPrice(p.price)}</div>
    <p class="description">${p.description || 'Premium quality hat available exclusively at MR HATS.'}</p>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="addToCart('${p.id}');closeModal()">&#128722; Add to Cart</button>
      <button class="btn btn-whatsapp" onclick="askAboutProduct('${p.id}')">&#128172; Ask on WhatsApp</button>
    </div>
  `;
  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow = '';
}

function galleryNav(id, dir) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const imgs = getProductImages(p);
  galleryIndex = (galleryIndex + dir + imgs.length) % imgs.length;
  if (window._currentGalleryRender) window._currentGalleryRender(galleryIndex);
}

function galleryGo(id, idx) {
  galleryIndex = idx;
  if (window._currentGalleryRender) window._currentGalleryRender(galleryIndex);
}

function askAboutProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const msg = encodeURIComponent(`Hi! I'm interested in the "${p.name}" by ${p.brand} (${formatPrice(p.price)}) from your MR HATS catalog. Is it available?`);
  window.open(`https://wa.me/${settings.whatsapp}?text=${msg}`, '_blank');
}

/* ============================================================
   CART
   ============================================================ */
function toggleCart() {
  const sidebar = document.getElementById('cartSidebar');
  const overlay = document.getElementById('cartOverlay');
  const isOpen = sidebar.classList.contains('open');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  document.body.style.overflow = isOpen ? '' : 'hidden';
  if (!isOpen) renderCart();
}

function addToCart(id) {
  const existing = cart.find(c => c.id === id);
  if (existing) { existing.qty++; }
  else { cart.push({ id, qty: 1 }); }
  saveData('cart', cart);
  updateCartBadge();
  toast('Added to cart!');
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  saveData('cart', cart);
  updateCartBadge();
  renderCart();
}

function updateQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { removeFromCart(id); return; }
  saveData('cart', cart);
  updateCartBadge();
  renderCart();
}

function updateCartBadge() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('visible', total > 0);
}

function getCartSubtotal() {
  return cart.reduce((s, c) => {
    const p = products.find(x => x.id === c.id);
    return s + (p ? p.price * c.qty : 0);
  }, 0);
}

function renderCart() {
  const el = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');

  // Clean cart of deleted products
  cart = cart.filter(c => products.find(x => x.id === c.id));
  saveData('cart', cart);

  if (cart.length === 0) {
    el.innerHTML = `<div class="cart-empty"><div class="icon">&#128722;</div><p>Your cart is empty</p></div>`;
    footer.innerHTML = '';
    updateCartBadge();
    return;
  }

  el.innerHTML = cart.map(c => {
    const p = products.find(x => x.id === c.id);
    if (!p) return '';
    return `
      <div class="cart-item">
        <div class="cart-item-img"><img src="${getProductImage(p)}" alt="${p.name}" loading="lazy"></div>
        <div class="cart-item-info">
          <div class="name">${p.name}</div>
          <div class="brand">${p.brand}</div>
          <div class="price">${formatPrice(p.price * c.qty)}</div>
        </div>
        <div class="cart-item-actions">
          <div class="qty-controls">
            <button class="qty-btn" onclick="updateQty('${c.id}', -1)">&minus;</button>
            <span class="qty-num">${c.qty}</span>
            <button class="qty-btn" onclick="updateQty('${c.id}', 1)">+</button>
          </div>
          <button class="cart-item-remove" onclick="removeFromCart('${c.id}')">Remove</button>
        </div>
      </div>
    `;
  }).join('');

  const subtotal = getCartSubtotal();
  const shipping = Number(settings.shippingCost) || 0;
  const tax = subtotal * (Number(settings.taxRate) || 0) / 100;
  const total = subtotal + shipping + tax;

  footer.innerHTML = `
    <div class="cart-totals">
      <div class="row"><span>Subtotal</span><span>${formatPrice(subtotal)}</span></div>
      ${shipping > 0 ? `<div class="row"><span>Shipping</span><span>${formatPrice(shipping)}</span></div>` : ''}
      ${tax > 0 ? `<div class="row"><span>Tax (${settings.taxRate}%)</span><span>${formatPrice(tax)}</span></div>` : ''}
      <div class="row total"><span>Total</span><span class="val">${formatPrice(total)}</span></div>
    </div>
    <button class="btn btn-whatsapp btn-block" onclick="checkoutWhatsApp()">&#128172; Checkout via WhatsApp</button>
    <button class="btn btn-outline btn-block" onclick="cart=[];saveData('cart',cart);updateCartBadge();renderCart();toast('Cart cleared')" style="margin-top:0.5rem">Clear Cart</button>
  `;
}

function checkoutWhatsApp() {
  if (cart.length === 0) return;
  const subtotal = getCartSubtotal();
  const shipping = Number(settings.shippingCost) || 0;
  const tax = subtotal * (Number(settings.taxRate) || 0) / 100;
  const total = subtotal + shipping + tax;

  let msg = `*MR HATS - New Order*\n\n`;
  cart.forEach(c => {
    const p = products.find(x => x.id === c.id);
    if (p) msg += `- ${p.name} (${p.brand}) x${c.qty} = ${formatPrice(p.price * c.qty)}\n`;
  });
  msg += `\n*Subtotal:* ${formatPrice(subtotal)}`;
  if (shipping > 0) msg += `\n*Shipping:* ${formatPrice(shipping)}`;
  if (tax > 0) msg += `\n*Tax:* ${formatPrice(tax)}`;
  msg += `\n*Total:* ${formatPrice(total)}`;
  msg += `\n\nPlease confirm availability and payment details. Thank you!`;

  window.open(`https://wa.me/${settings.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
}

let currentAdminTab = 'products';
let editingProductId = null;

function openAdmin() {
  const overlay = document.getElementById('adminOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (!adminLoggedIn) {
    renderAdminLogin();
  } else {
    renderAdminPanel();
  }
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderAdminLogin() {
  document.getElementById('adminPanel').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <h2 style="margin:0">&#128274; Admin Access</h2>
      <button class="btn btn-outline btn-sm" onclick="closeAdmin()">&times; Close</button>
    </div>
    <div class="login-box">
      <div class="lock-icon">&#128274;</div>
      <h3>Enter Password</h3>
      <p>Access the admin panel to manage products and settings.</p>
      <div class="form-group">
        <input type="password" id="adminPwInput" placeholder="Password" onkeypress="if(event.key==='Enter')attemptLogin()">
      </div>
      <button class="btn btn-gold btn-block" onclick="attemptLogin()">Unlock</button>
      <div id="loginError" style="margin-top:1rem"></div>
    </div>
  `;

}

function attemptLogin() {
  const pw = document.getElementById('adminPwInput').value;
  if (pw === settings.adminPassword) {
    adminLoggedIn = true;
    renderAdminPanel();
    toast('Welcome, Admin!');
  } else {
    document.getElementById('loginError').innerHTML = '<div class="alert alert-error">Incorrect password.</div>';
  }
}

function renderAdminPanel() {
  const tabs = [
    { key: 'products', label: '&#128230; Products' },
    { key: 'addProduct', label: '&#10133; Add Product' },
    { key: 'brands', label: '&#127991; Brands' },
    { key: 'settings', label: '&#9881; Settings' },
    { key: 'backup', label: '&#128190; Backup' }
  ];

  document.getElementById('adminPanel').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2 style="margin:0">&#128274; Admin Panel</h2>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-outline btn-sm" onclick="adminLoggedIn=false;closeAdmin()">Logout</button>
        <button class="btn btn-outline btn-sm" onclick="closeAdmin()">&times;</button>
      </div>
    </div>
    <div class="admin-tabs">
      ${tabs.map(t => `<button class="admin-tab ${currentAdminTab === t.key ? 'active' : ''}" onclick="currentAdminTab='${t.key}';renderAdminPanel()">${t.label}</button>`).join('')}
    </div>
    <div id="adminContent"></div>
  `;

  const content = document.getElementById('adminContent');

  switch (currentAdminTab) {
    case 'products': renderAdminProducts(content); break;
    case 'addProduct': renderAdminAddProduct(content); break;
    case 'brands': renderAdminBrands(content); break;
    case 'settings': renderAdminSettings(content); break;
    case 'backup': renderAdminBackup(content); break;

}

function renderAdminProducts(el) {
  if (products.length === 0) {
    el.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2rem">No products yet. Add your first product!</p>';
    return;
  }
  el.innerHTML = `
    <div class="admin-product-list">
      ${products.map(p => `
        <div class="admin-product-item">
          <div class="thumb"><img src="${getProductImage(p)}" alt="${p.name}" loading="lazy"></div>
          <div class="info">
            <div class="name">${p.name}</div>
            <div class="meta">${p.brand} &middot; ${formatPrice(p.price)} &middot; ${getProductImages(p).length} foto${getProductImages(p).length !== 1 ? 's' : ''}</div>
          </div>
          <div class="actions">
            <button class="btn btn-outline btn-sm" onclick="editProduct('${p.id}')">&#9998; Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">&#128465;</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

let productImageUrls = [''];

function renderAdminAddProduct(el, product = null) {
  const isEdit = !!product;
  const p = product || { name: '', brand: '', price: '', description: '', images: [] };
  const brands = getBrands();
  const existingImages = getProductImages(p);
  productImageUrls = existingImages.length > 0 ? [...existingImages] : [''];

  el.innerHTML = `
    <h3 style="margin-bottom:1rem">${isEdit ? 'Edit Product' : 'Add New Product'}</h3>
    <div id="productFormMsg"></div>
    <div class="form-row">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="pName" value="${p.name}" placeholder="e.g., Black Gold Crown">
      </div>
      <div class="form-group">
        <label>Brand *</label>
        <input type="text" id="pBrand" value="${p.brand}" placeholder="e.g., MR Hats Exclusive" list="brandList" oninput="updateBrandPhotoCount()">
        <datalist id="brandList">${brands.map(b => `<option value="${b}">`).join('')}</datalist>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price (USD) *</label>
        <input type="number" id="pPrice" value="${p.price}" placeholder="45" step="0.01" min="0">
      </div>
    </div>
    <div class="form-group">
      <label>Image URLs * (max ${MAX_PHOTOS_PER_BRAND} fotos por marca)</label>
      <div id="imageUrlList" class="multi-image-list"></div>
      <button type="button" class="add-image-btn" id="addImageBtn" onclick="addImageUrl()">+ Agregar otra foto</button>
      <div class="brand-photo-count" id="brandPhotoCount"></div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="pDesc" placeholder="Describe the product...">${p.description || ''}</textarea>
    </div>
    <div style="margin-bottom:1rem;padding:0.75rem;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--text-muted)">
      <strong>&#128248; Image Tips:</strong> Sube tus fotos a <a href="https://imgbb.com" target="_blank" style="color:var(--gold)">imgbb.com</a> o <a href="https://postimages.org" target="_blank" style="color:var(--gold)">postimages.org</a>, luego pega el link directo aqui. Puedes agregar hasta ${MAX_PHOTOS_PER_BRAND} fotos por marca.
    </div>
    <div style="display:flex;gap:0.75rem">
      <button class="btn btn-gold" onclick="saveProduct(${isEdit ? `'${p.id}'` : 'null'})">${isEdit ? 'Update Product' : 'Add Product'}</button>
      ${isEdit ? `<button class="btn btn-outline" onclick="editingProductId=null;currentAdminTab='products';renderAdminPanel()">Cancel</button>` : ''}
    </div>
  `;
  renderImageUrlInputs();
  updateBrandPhotoCount();
}

function renderImageUrlInputs() {
  const container = document.getElementById('imageUrlList');
  if (!container) return;
  container.innerHTML = productImageUrls.map((url, i) => `
    <div class="multi-image-row">
      <span style="color:var(--text-muted);font-size:0.75rem;min-width:20px">${i + 1}.</span>
      ${url ? `<img class="img-preview-thumb" src="${url}" onerror="this.style.display='none'" alt="">` : ''}
      <input type="url" value="${url}" placeholder="https://i.ibb.co/..." onchange="updateImageUrl(${i}, this.value)" oninput="updateImageUrl(${i}, this.value)">
      ${productImageUrls.length > 1 ? `<button type="button" class="remove-img-btn" onclick="removeImageUrl(${i})" title="Quitar">&times;</button>` : ''}
    </div>
  `).join('');
  updateAddImageButton();
}

function addImageUrl() {
  const brand = document.getElementById('pBrand') ? document.getElementById('pBrand').value.trim() : '';
  const editId = editingProductId || null;
  const otherPhotos = brand ? getBrandPhotoCount(brand, editId) : 0;
  const currentPhotos = productImageUrls.filter(u => u.trim()).length;
  if (otherPhotos + currentPhotos >= MAX_PHOTOS_PER_BRAND) {
    toast('Limite alcanzado: ' + MAX_PHOTOS_PER_BRAND + ' fotos por marca.');
    return;
  }
  productImageUrls.push('');
  renderImageUrlInputs();
}

function removeImageUrl(idx) {
  productImageUrls.splice(idx, 1);
  if (productImageUrls.length === 0) productImageUrls = [''];
  renderImageUrlInputs();
  updateBrandPhotoCount();
}

function updateImageUrl(idx, val) {
  productImageUrls[idx] = val;
  updateBrandPhotoCount();
}

function updateAddImageButton() {
  const btn = document.getElementById('addImageBtn');
  if (!btn) return;
  const brand = document.getElementById('pBrand') ? document.getElementById('pBrand').value.trim() : '';
  const editId = editingProductId || null;
  const otherPhotos = brand ? getBrandPhotoCount(brand, editId) : 0;
  const currentPhotos = productImageUrls.filter(u => u.trim()).length;
  const remaining = MAX_PHOTOS_PER_BRAND - otherPhotos - currentPhotos;
  btn.style.display = remaining <= 0 ? 'none' : '';
}

function updateBrandPhotoCount() {
  const el = document.getElementById('brandPhotoCount');
  if (!el) return;
  const brand = document.getElementById('pBrand') ? document.getElementById('pBrand').value.trim() : '';
  if (!brand) { el.textContent = ''; return; }
  const editId = editingProductId || null;
  const otherPhotos = getBrandPhotoCount(brand, editId);
  const currentPhotos = productImageUrls.filter(u => u.trim()).length;
  const total = otherPhotos + currentPhotos;
  el.textContent = `Fotos en "${brand}": ${total} / ${MAX_PHOTOS_PER_BRAND}`;
  el.style.color = total >= MAX_PHOTOS_PER_BRAND ? 'var(--danger)' : 'var(--text-muted)';
  updateAddImageButton();
}

function saveProduct(id) {
  const name = document.getElementById('pName').value.trim();
  const brand = document.getElementById('pBrand').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  const images = productImageUrls.filter(u => u.trim());
  const image = images.length > 0 ? images[0] : '';
  const description = document.getElementById('pDesc').value.trim();
  const msgEl = document.getElementById('productFormMsg');

  if (!name || !brand || isNaN(price) || images.length === 0) {
    msgEl.innerHTML = '<div class="alert alert-error">Llena todos los campos requeridos (*). Necesitas al menos 1 imagen.</div>';
    return;
  }

  // Check brand photo limit
  const otherPhotos = getBrandPhotoCount(brand, id);
  if (otherPhotos + images.length > MAX_PHOTOS_PER_BRAND) {
    msgEl.innerHTML = `<div class="alert alert-error">Limite excedido: la marca "${brand}" ya tiene ${otherPhotos} fotos. Maximo ${MAX_PHOTOS_PER_BRAND} por marca.</div>`;
    return;
  }

  if (id) {
    const idx = products.findIndex(p => p.id === id);
    if (idx !== -1) {
      products[idx] = { ...products[idx], name, brand, price, image, images, description };
      toast('Producto actualizado!');
    }
  } else {
    products.push({ id: uid(), name, brand, price, image, images, description });
    toast('Producto agregado!');
  }

  saveData('products', products);
  editingProductId = null;
  currentAdminTab = 'products';
  renderAdminPanel();
  renderBrandFilters();
  renderProducts();
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editingProductId = id;
  currentAdminTab = 'addProduct';
  renderAdminPanel();
  renderAdminAddProduct(document.getElementById('adminContent'), p);
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  products = products.filter(p => p.id !== id);
  saveData('products', products);
  renderAdminPanel();
  renderBrandFilters();
  renderProducts();
  toast('Product deleted.');
}

        <input type="text" id="newBrandName" placeholder="e.g., Supreme Caps">

        <button class="btn btn-gold" onclick="addQuickBrand()">Create Brand</button>
      </div>
    </div>
    <p style="color:var(--text-muted);font-size:0.8rem;margin-top:0.5rem">This creates a placeholder product. Edit it afterwards to add details.</p>
  `;
}

function addQuickBrand() {
  const name = document.getElementById('newBrandName').value.trim();
  if (!name) { toast('Enter a brand name', 'error'); return; }
  if (getBrands().includes(name)) { toast('Brand already exists', 'error'); return; }
  products.push({
    id: uid(),
    name: 'New Product',
    brand: name,
    price: 0,
    description: 'Edit this product to add details.',
    image: 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 400%22><rect fill=%22%231a1a1a%22 width=%22400%22 height=%22400%22/><text x=%22200%22 y=%22200%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23c9a84c%22 font-size=%2230%22>Add Image</text></svg>'
  });
  saveData('products', products);
  renderAdminPanel();
  renderBrandFilters();
  renderProducts();
  toast(`Brand "${name}" created!`);
}

function deleteBrand(brand) {
  const count = products.filter(p => p.brand === brand).length;
  if (!confirm(`Delete brand "${brand}" and its ${count} product(s)?`)) return;
  products = products.filter(p => p.brand !== brand);
  saveData('products', products);
  if (activeBrand === brand) activeBrand = 'all';
  renderAdminPanel();
  renderBrandFilters();
  renderProducts();
  toast(`Brand "${brand}" deleted.`);
}

function renderAdminSettings(el) {
  el.innerHTML = `
    <h3 style="margin-bottom:1rem">Store Settings</h3>
    <div id="settingsMsg"></div>
    <div class="form-row">
      <div class="form-group">
        <label>Store Name</label>
        <input type="text" id="sName" value="${settings.storeName}">
      </div>
      <div class="form-group">
        <label>WhatsApp Number (with country code, no + or spaces)</label>
        <input type="text" id="sWhatsApp" value="${settings.whatsapp}" placeholder="12105551234">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Shipping Cost (USD)</label>
        <input type="number" id="sShipping" value="${settings.shippingCost}" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Tax Rate (%)</label>
        <input type="number" id="sTax" value="${settings.taxRate}" step="0.01" min="0">
      </div>
    </div>
    <h4 style="margin:1.5rem 0 0.75rem;font-size:0.9rem">Change Admin Password</h4>
    <div class="form-row">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="sNewPw" placeholder="Leave blank to keep current">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="sNewPw2" placeholder="Confirm new password">
      </div>
    </div>
    <button class="btn btn-gold" onclick="saveSettings()" style="margin-top:0.5rem">Save Settings</button>
  `;
}

function saveSettings() {
  const msgEl = document.getElementById('settingsMsg');
  const name = document.getElementById('sName').value.trim();
  const wa = document.getElementById('sWhatsApp').value.trim().replace(/\D/g, '');
  const ship = parseFloat(document.getElementById('sShipping').value) || 0;
  const tax = parseFloat(document.getElementById('sTax').value) || 0;
  const pw1 = document.getElementById('sNewPw').value;
  const pw2 = document.getElementById('sNewPw2').value;

  if (!name) { msgEl.innerHTML = '<div class="alert alert-error">Store name is required.</div>'; return; }
  if (!wa) { msgEl.innerHTML = '<div class="alert alert-error">WhatsApp number is required.</div>'; return; }

  settings.storeName = name;
  settings.whatsapp = wa;
  settings.shippingCost = ship;
  settings.taxRate = tax;

  if (pw1) {
    if (pw1 !== pw2) { msgEl.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>'; return; }
    if (pw1.length < 4) { msgEl.innerHTML = '<div class="alert alert-error">Password must be at least 4 characters.</div>'; return; }
    settings.adminPassword = pw1;
  }

  saveData('settings', settings);
  msgEl.innerHTML = '<div class="alert alert-success">Settings saved successfully!</div>';
  toast('Settings saved!');
}

function renderAdminBackup(el) {
  el.innerHTML = `
    <h3 style="margin-bottom:1rem">Backup & Restore</h3>
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem">Export your catalog data as JSON for backup, or import a previously exported file to restore.</p>

    <h4 style="margin-bottom:0.75rem;font-size:0.9rem">&#128228; Export Data</h4>
    <button class="btn btn-gold" onclick="exportData()" style="margin-bottom:1.5rem">Download JSON Backup</button>

    <h4 style="margin-bottom:0.75rem;font-size:0.9rem">&#128229; Import Data</h4>
    <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.75rem">Paste your JSON backup below and click Import. This will REPLACE all current data.</p>
    <textarea class="json-area" id="importArea" placeholder='Paste your JSON backup here...'></textarea>
    <button class="btn btn-outline" onclick="importData()" style="margin-top:0.75rem">Import Data</button>
    <div id="backupMsg" style="margin-top:1rem"></div>

    <h4 style="margin:2rem 0 0.75rem;font-size:0.9rem">&#9888; Reset to Defaults</h4>
    <button class="btn btn-danger btn-sm" onclick="resetDefaults()">Reset Everything to Defaults</button>
  `;
}

function exportData() {
  const data = { products, settings, exportDate: new Date().toISOString(), version: '2.0' };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mrhats-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Backup downloaded!');
}

function importData() {
  const msgEl = document.getElementById('backupMsg');
  try {
    const raw = document.getElementById('importArea').value.trim();
    if (!raw) { msgEl.innerHTML = '<div class="alert alert-error">Paste JSON data first.</div>'; return; }
    const data = JSON.parse(raw);
    if (!data.products || !Array.isArray(data.products)) throw new Error('Invalid format: missing products array');

    if (!confirm(`Import ${data.products.length} products? This will REPLACE all current data.`)) return;

    products = data.products;
    products.forEach((p, i) => { if (!p.id) p.id = uid(); });
    if (data.settings) settings = { ...DEFAULT_SETTINGS, ...data.settings };

    saveData('products', products);
    saveData('settings', settings);
    activeBrand = 'all';
    renderBrandFilters();
    renderProducts();
    renderAdminPanel();
    toast('Data imported successfully!');
  } catch (e) {
    msgEl.innerHTML = `<div class="alert alert-error">Import failed: ${e.message}</div>`;
  }
}

function resetDefaults() {
  if (!confirm('Reset ALL data to factory defaults? This cannot be undone!')) return;
  if (!confirm('Are you sure? All your products and settings will be lost.')) return;

  products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  settings = { ...DEFAULT_SETTINGS };
  cart = [];

  saveData('products', products);
  saveData('settings', settings);
  saveData('cart', cart);
  activeBrand = 'all';

  renderBrandFilters();
  renderProducts();
  updateCartBadge();
  renderAdminPanel();
  toast('Reset to defaults complete.');
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  renderBrandFilters();
  renderProducts();
  updateCartBadge();

  // Check for #admin hash
  if (window.location.hash === '#admin' || window.location.hash === '#/admin') {
    openAdmin();
  }

  // Listen for hash changes
  window.addEventListener('hashchange', () => {
    if (window.location.hash === '#admin' || window.location.hash === '#/admin') {
      openAdmin();
    }
  });

  // Close modals on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('adminOverlay').classList.contains('open')) closeAdmin();
      else if (document.getElementById('cartSidebar').classList.contains('open')) toggleCart();
      else if (document.getElementById('productModal').classList.contains('open')) closeModal();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
